name: api gateway CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag in the format api-gateway-vX.Y.Z
        required: true
        type: string

jobs:
  ci:
    if: github.event_name != 'workflow_dispatch'
    uses: project-taskflow/taskflow/.github/workflows/reusable-ci.yaml@main
    with:
      trigger_event: ${{ github.event_name }}
      source_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      service_name: api-gateway
      image_name: api-gateway
      helm_values_key: apiGateway
      dev_manifest_path: argocd-test/dev/api-gateway-application.yaml
      sonar_key: project-taskflow_taskflow-api-gateway_bb83b1d2-1639-4bfd-8785-c64f5e812197
      docker_context: .
      dockerfile_path: ./Dockerfile
      working_directory: .
      infra_repository: project-taskflow/taskflow
      infra_ref: main
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_URL: ${{ secrets.SONAR_URL }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      TOKEN: ${{ secrets.TOKEN }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

  release:
    if: github.event_name == 'workflow_dispatch'
    uses: project-taskflow/taskflow/.github/workflows/reusable-release.yaml@main
    with:
      release_tag: ${{ inputs.release_tag }}
      service_name: api-gateway
      image_name: api-gateway
      helm_values_key: api-gateway
      dev_manifest_path: argocd-test/dev/api-gateway-application.yaml
      prod_manifest_path: argocd-test/prod/api-gateway-application.yaml
      infra_repository: project-taskflow/taskflow
      infra_ref: main
    secrets:
      TOKEN: ${{ secrets.TOKEN }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

